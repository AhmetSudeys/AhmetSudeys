name: Generate Snake

on:
  schedule:
    # Her 24 saatte bir (Gece 00:00'da) çalışır
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Her yeni commit attığında da çalışması için alt satırı ekledim:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    # Buradaki izinler kısmını mutlaka ekle
    permissions:
      contents: write
    
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Snake to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
